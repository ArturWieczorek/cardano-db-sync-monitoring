# Bump these revs when you bump the corresponding versions in pyproject.toml
# (or when ruff/mypy themselves release a major upgrade you want to pick up).
# Keep them roughly in sync with what `requirements.lock` resolves to.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        # Pin the stub versions to match requirements.lock so the hook's mypy and
        # the venv's mypy resolve identical stubs (an unpinned stub here can drift
        # to a newer version than the lock and flag/clear different errors).
        additional_dependencies:
          - pandas-stubs==2.3.3.260113
          - types-psutil==7.2.2.20260518
